<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sastamilaga AI Shopping Guide</title><style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(145deg,#07111f,#111a38);color:#fff}header{padding:16px;background:rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.14)}h1{font-size:1.05rem;margin:0}.body{height:430px;overflow:auto;padding:14px}.bot,.me{padding:11px 13px;border-radius:16px;margin:8px 0;line-height:1.45}.bot{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14)}.me{background:linear-gradient(135deg,#06b6d4,#7c3aed);margin-left:34px}a{color:#a7f3d0}.bar{display:grid;grid-template-columns:1fr 54px;gap:8px;padding:12px;border-top:1px solid rgba(255,255,255,.14)}input,button{border:0;border-radius:999px;padding:13px}button{background:#f59e0b;font-weight:900}</style></head><body><header><h1>🤖 Sastamilaga Shopping Guide</h1><small>Text help for products, delivery, price and order support</small></header><div id="body" class="body"></div><div class="bar"><input id="msg" placeholder="Ask: show airpods, delivery charge..."><button id="send">➤</button></div><script src="/products_data.js"></script><script>
const P=parent.window.SASTAMILAGA_PRODUCTS||window.SASTAMILAGA_PRODUCTS||[];function reply(q){q=q.toLowerCase();if(q.includes('delivery')||q.includes('shipping'))return 'Delivery charge is shown on each product page. Open any product and check the delivery charge and final price blocks.';if(q.includes('return'))return 'Return policy page explains replacement/return steps. For product-specific support, share SKU and order details.';if(q.includes('commission'))return 'Commission is editable in the catalog CSV and Apps Script settings. Final price = base + commission + delivery.';let terms=q.split(/\s+/).filter(x=>x.length>2);let matches=P.map(p=>({p,s:terms.reduce((n,t)=>n+([p.name,p.cat,p.sku,(p.tags||[]).join(' ')].join(' ').toLowerCase().includes(t)?1:0),0)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,4);if(matches.length)return 'I found these products:<br>'+matches.map(x=>`<a target="_top" href="${x.p.url}">${x.p.name}</a> — ${x.p.price}`).join('<br>');return 'I can help you search products, check categories, understand delivery charges, and find order help. Try: “show airpods case”, “delivery charge”, or “commission settings”.'}function send(){const i=document.querySelector('#msg');const q=i.value.trim();if(!q)return;add(q,'me');i.value='';setTimeout(()=>add(reply(q),'bot'),250)}function add(m,c){const b=document.querySelector('#body');b.innerHTML+=`<div class="${c}">${m}</div>`;b.scrollTop=b.scrollHeight}document.addEventListener('DOMContentLoaded',()=>{document.querySelector('#send').onclick=send;document.querySelector('#msg').addEventListener('keydown',e=>{if(e.key==='Enter')send()});add('Hi, I am your shopping guide. Ask product name, category, delivery, price or commission help.','bot')});
</script></body></html>
